
## MacOS and Linux

{{- if ne .chezmoi.os "windows" }}
[".oh-my-zsh"]
    type = "git-repo"
    url = "https://github.com/ohmyzsh/ohmyzsh.git"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
[".oh-my-zsh/custom/themes/powerlevel10k"]
    type = "git-repo"
    url = "https://github.com/romkatv/powerlevel10k.git"
    exact = true
    stripComponents = 1
#[".pyenv"]
#    type = "git-repo"
#    url = "https://github.com/pyenv/pyenv.git"
#    refreshPeriod = "168h"
[".fzf"]
    type = "git-repo"
    url = "https://github.com/junegunn/fzf.git"
    refreshPeriod = "168h"
    stripComponents = 1
[".tmux/plugins/tpm"]
    type = "git-repo"
    url = "https://github.com/tmux-plugins/tpm"
    refreshPeriod = "168h"
    stripComponents = 1
{{- end }}

### Windows Only
{{- if eq .chezmoi.os "windows" }}
[".pyenv"]
    type = "git-repo"
    url = "https://github.com/pyenv-win/pyenv-win.git"
    refreshPeriod = "168h"
{{ end }}

### Any OS
[".vim/autoload"]
    type = "git-repo"
    url = "https://github.com/junegunn/vim-plug.git"
    refreshPeriod = "168h"
